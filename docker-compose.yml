services:
  nginx:
    image: nginx:stable-alpine
    container_name: ticontrol_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ticontrol_network

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ticontrol_app
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - postgres
    networks:
      - ticontrol_network

  postgres:
    image: postgres:16-alpine
    container_name: ticontrol_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ticontrol_postgres_data:/var/lib/postgresql/data
    networks:
      - ticontrol_network

networks:
  ticontrol_network:
    driver: bridge

volumes:
  ticontrol_postgres_data:
    driver: local